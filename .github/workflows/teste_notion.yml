name: Teste Notion
on:
  workflow_dispatch:

jobs:
  teste:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python teste_notion.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
