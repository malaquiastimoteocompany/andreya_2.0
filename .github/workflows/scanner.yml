name: Andreya v2 — Scanner
# Disparado via webhook do cron-job.org (workflow_dispatch)
# NÃO usar schedule do GitHub Actions — atrasos de até 10min inaceitáveis
# para o scan S2b (30 min).
#
# CONGELADO 05/07/2026: pesado/leve/breakout deixaram de ser accionados —
# ver s2b_v2.py e a nota em scanner.py:main(). Mantidos na lista só para
# não partir o comando /analise_token nem chamadas manuais de depuração;
# escolhê-los agora falha de propósito.
on:
  workflow_dispatch:
    inputs:
      scan_tipo:
        description: 'Tipo de scan'
        required: true
        default: 's2b'
        type: choice
        options:
          - s2b
          - analise_token
          - pesado
          - leve
          - breakout
      symbol:
        description: 'Token a analisar (só para scan_tipo=analise_token). Ex: SHIB ou SHIB_USDT'
        required: false
        default: ''
        type: string

permissions:
  contents: write   # necessário para ler e escrever s2b_historico.json / s2b_outcomes.json

jobs:
  scanner:
    name: "Scan ${{ inputs.scan_tipo }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v5

      # ── 2. Python ───────────────────────────────────────────────────────────
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Dependências ──────────────────────────────────────────────────────
      - name: Instalar dependências Python
        run: pip install -r requirements.txt

      # Playwright já não é usado por nenhum scan activo (s2b não precisa;
      # pesado/breakout estão congelados) — mantido só se algum dia
      # analise_token vier a precisar. Sem custo se não for instalado.
      - name: Instalar Chromium (Playwright)
        if: inputs.scan_tipo == 'pesado' || inputs.scan_tipo == 'breakout'
        run: playwright install chromium --with-deps

      # ── 4. Executar scanner ──────────────────────────────────────────────────
      - name: "Run scanner (${{ inputs.scan_tipo }})"
        env:
          SCAN_TIPO:          ${{ inputs.scan_tipo }}
          SYMBOL:              ${{ inputs.symbol }}
          MEXC_API_KEY:       ${{ secrets.MEXC_API_KEY }}
          MEXC_API_SECRET:    ${{ secrets.MEXC_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
        run: python scanner.py